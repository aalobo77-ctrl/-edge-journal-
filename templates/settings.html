{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="page-narrow">
  <div class="card">
    <div class="card-header"><span class="card-title">Goals</span></div>
    <form method="POST">
      <div class="two-col">
        <div class="fg">
          <label>Daily Goal ($)</label>
          <input type="number" step="0.01" name="daily_goal" value="{{ current_user.daily_goal or '' }}" />
        </div>
        <div class="fg">
          <label>Weekly Goal ($)</label>
          <input type="number" step="0.01" name="weekly_goal" value="{{ current_user.weekly_goal or '' }}" />
        </div>
      </div>
      <div class="fg">
        <label>Monthly Goal ($)</label>
        <input type="number" step="0.01" name="monthly_goal" value="{{ current_user.monthly_goal or '' }}" />
      </div>
      <div class="card-title" style="margin:20px 0 10px;">Account</div>
      <div class="fg">
        <label>Starting Balance ($)</label>
        <input type="number" step="0.01" name="starting_balance" value="{{ current_user.starting_balance or '10000.00' }}" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Save Settings</button>
    </form>
  </div>
  <div class="card" style="margin-top:12px;">
    <div class="card-header"><span class="card-title">Danger Zone</span></div>
    <form method="POST" action="{{ url_for('delete_all_trades') }}" onsubmit="return confirm('Delete ALL trades? This cannot be undone.')">
      <button type="submit" class="btn btn-danger" style="width:100%;">Delete All Trades</button>
    </form>
  </div>
</div>
{% endblock %}
